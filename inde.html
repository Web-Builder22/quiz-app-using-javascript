<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Quiz App</title>

    <link rel="stylesheet" href="bsty.css">
</head>


<body>

    <div class="main-content">


        <!-- Name Section -->
        <div class="name-box">

            <input 
                type="text" 
                id="username" 
                placeholder="Enter your name"
            >

            <button id="startBtn">
                Start Quiz
            </button>

        </div>



        <!-- Username Display -->
        <h2 id="displayName"></h2>




        <!-- Main Container -->
        <div class="container">


            <h1>
                Programming Quiz App
            </h1>


            <p class="subtitle">
                Choose a topic and test your programming knowledge.
            </p>



            <!-- Topics -->
            <div class="topics">


                <button class="topic-btn" id="cpp">
                    💻 C++ Programming
                </button>


                <button class="topic-btn" id="java">
                    ☕ Java Programming
                </button>


                <button class="topic-btn" id="web">
                    🌐 HTML, CSS & JavaScript
                </button>


                <button class="topic-btn" id="dsa">
                    📚 Data Structures & Algorithms
                </button>


            </div>





            <!-- Quiz Section -->

            <div id="quiz" hidden>


                <h2 class="question">
                    
                </h2>



                <div class="option">

                </div>



                <button class="next">
                    Next
                </button>


            </div>


        </div>


    </div>





    <!-- Footer -->

  



    <script src="scr.js"></script>


</body>

</html>
